repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Backend Python hooks
  - repo: local
    hooks:
      - id: black-backend
        name: Black (Python formatter)
        entry: black
        language: system
        types: [python]
        files: ^backend/.*\.py$
        args: [--line-length=88]

      - id: ruff-backend
        name: Ruff (Python linter)
        entry: ruff check --fix
        language: system
        types: [python]
        files: ^backend/.*\.py$

      - id: ruff-format-backend
        name: Ruff format (Python formatter)
        entry: ruff
        language: system
        types: [python]
        files: ^backend/.*\.py$
        args: [format]

      - id: mypy-backend
        name: MyPy (Python type checker)
        entry: mypy backend/
        language: system
        types: [python]
        files: ^backend/.*\.py$
        args: [--ignore-missing-imports]
        pass_filenames: false
        always_run: true

  # Frontend hooks
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (JavaScript/TypeScript linter)
        entry: sh -c 'cd frontend && npm run lint:fix'
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        always_run: true

      - id: prettier-frontend
        name: Prettier (JavaScript/TypeScript formatter)
        entry: sh -c 'cd frontend && npm run format'
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx|json|css|md)$
        pass_filenames: false
        always_run: true

      - id: typecheck-frontend
        name: TypeScript type check
        entry: sh -c 'cd frontend && npm run type-check'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
        always_run: true

  # General hooks
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, markdown, html, css, scss, javascript, json]
        exclude: ^frontend/|^backend/.*\.py$ # Exclude frontend and Python files
        args: [--config=.prettierrc]

  # Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
